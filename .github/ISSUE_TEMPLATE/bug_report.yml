name: Bug report
description: Report something that isn't working as expected
labels: ["bug", "triage"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reliably reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Run '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened. Include logs, stack traces, or screenshots if relevant.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Repo/service, version or commit SHA, environment (local/staging/prod), OS/browser if relevant.
    validations:
      required: false
  - type: checkboxes
    id: sensitive-data
    attributes:
      label: Data handling
      description: FinHero Data handles sensitive consumer/credit data. Confirm before submitting.
      options:
        - label: I have not included any real customer PII, credit data, or secrets in this report
          required: true
